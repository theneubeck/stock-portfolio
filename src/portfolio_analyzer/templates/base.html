<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portfolio Analyzer{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
      --gold: #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
    }
    nav {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    nav a:hover { text-decoration: underline; }
    nav a.active { color: var(--gold); }
    h1 {
      font-size: 1.25rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    h2 {
      font-size: 0.95rem;
      color: var(--gold);
      margin: 1.5rem 0 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .kv { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1.5rem; }
    .kv dt { color: var(--muted); }
    .kv dd { text-align: right; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-best { background: #166534; color: var(--green); }
    .badge-worst { background: #7f1d1d; color: var(--red); }
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" {% if active == "dashboard" %}class="active"{% endif %}>Dashboard</a>
    <a href="/comparison" {% if active == "comparison" %}class="active"{% endif %}>Comparison</a>
  </nav>
  {% block content %}{% endblock %}
  <footer>Portfolio Analyzer — read-only view</footer>
</body>
</html>
